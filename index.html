<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Mafia</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:url('YOUR_IMAGE_URL_HERE') center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.overlay{
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:20px;
max-width:600px;
color:white;
}

.top-text{
font-size:28px;
margin-bottom:15px;
text-shadow:0 0 10px black;
}

.title{
font-size:65px;
font-weight:bold;
margin-bottom:30px;
text-shadow:0 0 15px black;
}

.join-btn{
display:inline-block;
background:#0d00ff;
color:white;
padding:20px 35px;
font-size:28px;
font-weight:bold;
text-decoration:none;
border-radius:18px;
box-shadow:0 0 25px rgba(13,0,255,.8);
margin-bottom:40px;
}

.join-btn:hover{
transform:scale(1.03);
}

.count-text{
font-size:24px;
margin-bottom:15px;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
background:#0d00ff;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
font-weight:bold;
margin:auto;
box-shadow:0 0 30px rgba(13,0,255,.8);
}

.bottom{
margin-top:25px;
font-size:24px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

<div class="top-text">
India No.1 Cricket Community
</div>

<div class="title">
PREDICTION MAFIA
</div>

<a href="https://telegram.me/+qprvDFpBY442ZjZl
class="join-btn"
onclick="fbq('track','Lead');">
Join The Original Prediction Mafia 🚀
</a>

<div class="count-text">
FREE JOINING ENDS IN...
</div>

<div class="circle" id="timer">
21
</div>

<div class="bottom">
Join The Original Prediction Mafia
</div>

</div>

</div>

<script>
let count=21;

setInterval(()=>{
document.getElementById("timer").innerHTML=count;

if(count<=1){
count=21;
}else{
count--;
}
},1000);
</script>

</body>
</html>
